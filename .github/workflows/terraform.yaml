name: Terraform CI/CD

on:
  pull_request:
    branches: [ dev ]
    types: [ opened, synchronize, reopened, closed ]

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ROLE_TO_ASSUME: |
    ${{
      (github.base_ref == 'dev' && 'arn:aws:iam::914690098914:role/github-terraform-service-role') ||
      (github.base_ref == 'main' && 'arn:aws:iam::112233445566:role/kfs-stg-sdk-role-githubactions-file-transfer-batch'
    }}

jobs:

  terraform-plan:
    runs-on: ubuntu-latest

    if: github.event.action != 'closed'

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    defaults:
      run:
        working-directory: env/dev

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
		  aws-region: ${{ env.AWS_REGION }}
		  role-to-assume: ${{ env.ROLE_TO_ASSUME }}

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format Check
      run: terraform fmt -check

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan -no-color -out=tfplan

    - name: Save Plan as Text
      run: terraform show -no-color tfplan > plan.txt

    - name: Comment Plan in PR
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        path: env/dev/plan.txt

    - name: Upload Plan Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tfplan
        path: env/dev/tfplan
        retention-days: 1


  terraform-apply:
    runs-on: ubuntu-latest

    if: github.event.action == 'closed' && github.event.pull_request.merged == true

    environment: terraform-apply-approval

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: env/dev

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
		  aws-region: ${{ env.AWS_REGION }}
		  role-to-assume: ${{ env.ROLE_TO_ASSUME }}

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan -no-color -out=tfplan

    - name: Terraform Apply
      run: terraform apply -auto-approve tfplan