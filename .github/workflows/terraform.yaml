name: Terraform CI/CD

on:
  pull_request:
    branches: [ dev, main ]
    types: [ opened, synchronize, reopened, closed ]

concurrency:
  group: terraform-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ROLE_TO_ASSUME: arn:aws:iam::914690098914:role/github-terraform-service-role

jobs:

  plan:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    defaults:
      run:
        working-directory: ${{ github.base_ref == 'main' && 'env/prod' || 'env/dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan

      - name: Save Plan as Text
        run: terraform show -no-color tfplan > plan.txt

      - name: Comment Plan in PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: env/dev/plan.txt


  terraform-apply:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && github.event.pull_request.merged == true

    environment: ${{ github.base_ref == 'main' && 'prod-approval' || 'dev-approval' }}

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: ${{ github.base_ref == 'main' && 'env/prod' || 'env/dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan